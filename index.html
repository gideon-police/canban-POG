<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | STRATEGIC INTERFACE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #010408; font-family: 'Courier New', Courier, monospace; color: #fff; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #chart { width: 100%; height: 100%; position: absolute; z-index: 10; cursor: crosshair; }

        /* HUD - Вертикальний Дашборд (Ліворуч) */
        .hud-left {
            position: absolute; top: 50px; left: 40px; z-index: 100;
            border-left: 2px solid #00f2ff; padding-left: 15px;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }

        /* HUD - Аналіз Ризику (Праворуч) */
        .hud-right {
            position: absolute; top: 50px; right: 40px; z-index: 100;
            text-align: right; pointer-events: none;
        }
        .risk-indicator { font-size: 28px; font-weight: bold; color: #ff4d4d; text-shadow: 0 0 15px #ff4d4d; }

        /* Орбіти та вузли */
        .orbit-line { fill: none; stroke: rgba(0, 242, 255, 0.05); stroke-width: 1; stroke-dasharray: 5,5; }
        
        /* Новий стиль вузлів (Голограма) */
        .node { cursor: pointer; }
        .node-base { 
            fill: rgba(0, 242, 255, 0.05); stroke: #00f2ff; stroke-width: 1px; 
            transition: all 0.3s ease; filter: drop-shadow(0 0 8px #00f2ff);
        }
        .node:hover .node-base { fill: rgba(0, 242, 255, 0.2); stroke-width: 2px; }

        /* Анімоване кільце при наведенні */
        .node-ring { 
            fill: none; stroke: rgba(0, 242, 255, 0.3); stroke-width: 1px; 
            visibility: hidden; transform-origin: center; animation: rotateHolo 15s linear infinite; 
        }
        .node:hover .node-ring { visibility: visible; }

        /* Текст вузлів */
        .node text { 
            fill: #fff; font-size: 10px; text-anchor: middle; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 0 10px #000;
        }

        /* HUD Вікно */
        .hud-popup {
            position: absolute; background: rgba(0, 15, 30, 0.95);
            border: 2px solid #00f2ff; border-radius: 0 20px 0 20px;
            padding: 20px; z-index: 2000; width: 320px;
            backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
            display: none; animation: slideIn 0.3s ease; pointer-events: all;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } }

        .hud-popup h3 { margin: 0; color: #00f2ff; text-transform: uppercase; font-size: 16px; letter-spacing: 2px; }
        .hud-popup .unit { font-size: 11px; color: #8df; display: block; margin-bottom: 10px; }
        .hud-popup .impact-block { 
            margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;
            font-size: 13px; color: #ffbcbc; background: rgba(255, 77, 77, 0.1); border-radius: 4px; padding: 10px;
        }

        @keyframes rotateHolo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="hud-left">
    <h1 style="margin:0; font-size: 20px;">GIDEON CONTROL</h1>
    <div id="status-display" style="font-size: 11px; opacity: 0.7;">SECTOR_SCAN...ACTIVE</div>
    <div style="font-size: 11px; opacity: 0.7; margin-top:5px;">OBJECTS TRACKED: 51</div>
</div>

<div class="hud-right">
    <div style="font-size: 11px; opacity: 0.7;">THREAT LEVEL</div>
    <div class="risk-indicator">CRITICAL_5</div>
    <div id="system-time" style="font-size: 11px; opacity: 0.7;">UTC 12:45:01</div>
</div>

<canvas id="stars-bg"></canvas>
<div id="chart"></div>

<div id="hud-window" class="hud-popup">
    <div style="float:right; cursor:pointer;" onclick="hideHUD()">[CLOSE]</div>
    <h3 id="h-title">Planetary Issue</h3>
    <span id="h-unit" class="unit">SECTOR_ANALYSIS</span>
    <p id="h-desc" style="font-size: 13px; line-height: 1.5; color: #ccc; font-family: sans-serif;"></p>
    <div class="impact-block" id="h-impact"></div>
</div>

<script>
    // --- 1. КІНЕМАТОГРАФІЧНИЙ КОСМОС (Паралакс) ---
    const canvas = document.getElementById('stars-bg');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 300}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 1.5, speed: Math.random() * 0.5
        }));
    }

    function drawStars() {
        ctx.fillStyle = "#010408"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            s.x -= s.speed; if(s.x < 0) s.x = canvas.width;
        });
        requestAnimationFrame(drawStars);
    }
    initStars(); drawStars();

    // --- 2. ДАНІ ТА ВУЗЛИ (ГОЛОГРАМИ) ---
    const data = [
        { n: "БОДІ-КАМЕРИ", d: "Невикористання портативних відеореєстраторів.", i: "Відсутність доказової бази, нульовий контроль.", u: "ALL UNITS", r: 40 },
        { n: "ЗАСОБИ ЗАХИСТУ", d: "Брак шоломів та бронежилетів (4 клас).", i: "Загроза життю ПОГ при нападі.", u: "CHERKASY RUP", r: 35 },
        { n: "ТРАНСПОРТ", d: "Порушення транспортної дисципліни.", i: "Скасування дозволів, адмінвідповідальність.", u: "ALL UNITS", r: 38 },
        { n: "МТЗ СТАНЦІЙ", d: "Брак сейфів та пального.", i: "Ризик крадіжки зброї, негативний імідж.", u: "ALL UNITS", r: 32 },
        { n: "КОМУНІКАЦІЯ", d: "Слабка взаємодія з ОТГ.", i: "Брак фінансування програм ПОГ.", u: "ALL UNITS", r: 35 }
    ];

    const nodes = [{ id: 0, n: "GIDEON CORE", type: "core", r: 50, d: "", i: "", u: "" }].concat(data.map((d, i) => ({ id: i+1, ...d, type: "issue" })));
    const links = data.map((_, i) => ({ source: 0, target: i+1 }));

    const svg = d3.select("#chart").append("svg").attr("width", "100%").attr("height", "100%");
    const g = svg.append("g");

    // Орбіти (декоративні)
    [220, 350, 480].forEach(r => g.append("circle").attr("class", "orbit-line").attr("cx", window.innerWidth/2).attr("cy", window.innerHeight/2).attr("r", r));

    const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(280))
        .force("charge", d3.forceManyBody().strength(-4000))
        .force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2));

    const node = g.append("g").selectAll("g").data(nodes).enter().append("g")
        .attr("class", d => `node ${d.type === 'core' ? 'node-core' : ''}`)
        .on("click", (e, d) => { if(d.id !== 0) showHUD(e, d); });

    // Голографічне кільце при наведенні
    node.append("circle").attr("class", "node-ring").attr("r", d => d.r + 15);

    // Основний вузол (Голограма)
    node.append("circle").attr("class", "node-base").attr("r", d => d.r);

    node.append("text").attr("dy", d => d.type === 'core' ? 70 : d.r + 30).text(d => d.n);

    sim.on("tick", () => {
        const t = Date.now() * 0.001;
        node.attr("transform", d => `translate(${d.x},${d.y + (d.id === 0 ? 0 : Math.sin(t + d.id)*4)})`);
    });

    function showHUD(e, d) {
        const hud = document.getElementById('hud-window');
        hud.style.display = 'block';
        hud.style.left = Math.min(e.pageX + 30, window.innerWidth - 360) + 'px';
        hud.style.top = Math.max(e.pageY - 100, 20) + 'px';
        document.getElementById('h-title').innerText = d.n;
        document.getElementById('h-unit').innerText = "UNIT: " + d.u;
        document.getElementById('h-desc').innerText = d.d;
        document.getElementById('h-impact').innerHTML = "<b>АНАЛІЗ НАСЛІДКІВ:</b><br>" + d.i;
    }

    function hideHUD() { document.getElementById('hud-window').style.display = 'none'; }

    // Анімація системного часу
    setInterval(() => {
        const now = new Date();
        document.getElementById('system-time').innerText = "UTC " + now.toISOString().substring(11, 19);
    }, 1000);

    // Drag functionality
    node.call(d3.drag()
        .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; hideHUD(); })
        .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

</script>
</body>
</html>
