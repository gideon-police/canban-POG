<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | CELESTIAL MONITOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020408; font-family: 'Segoe UI', sans-serif; }
        
        /* Глибокий космос */
        #space {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a192f 0%, #020408 100%);
            z-index: 1;
        }

        #chart { width: 100%; height: 100%; position: absolute; z-index: 10; }

        /* Стилі орбіт */
        .orbit-line { fill: none; stroke: rgba(0, 242, 255, 0.1); stroke-width: 1px; }

        /* Планети */
        .node circle { cursor: pointer; transition: all 0.4s ease; }
        .node:hover circle { filter: brightness(1.2) drop-shadow(0 0 30px var(--p-color)); }
        
        .node text { 
            fill: #fff; font-size: 10px; font-weight: bold; pointer-events: none; 
            text-shadow: 0 0 10px #000; text-transform: uppercase; letter-spacing: 2px;
        }

        /* Кільця планет */
        .planet-ring { fill: none; stroke-width: 2px; opacity: 0.4; pointer-events: none; }

        /* Контекстне вікно (HUD) */
        .hud-popup {
            position: absolute;
            background: rgba(0, 15, 30, 0.9);
            border: 1px solid var(--p-color);
            padding: 20px;
            z-index: 2000;
            width: 300px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px var(--p-color);
            display: none;
            border-radius: 0 20px 0 20px;
            animation: bootUp 0.3s ease-out;
        }

        @keyframes bootUp {
            from { opacity: 0; transform: scale(0.8) skewX(10deg); }
            to { opacity: 1; transform: scale(1) skewX(0deg); }
        }

        .hud-popup h3 { margin: 0; color: var(--p-color); font-size: 18px; border-bottom: 1px solid var(--p-color); padding-bottom: 10px; }
        .hud-popup .impact { color: #ff4d4d; font-size: 13px; margin-top: 15px; border-left: 3px solid #ff4d4d; padding-left: 10px; }
        
        .ui-overlay {
            position: absolute; top: 40px; left: 40px; z-index: 100;
            color: #00f2ff; text-transform: uppercase; letter-spacing: 4px;
        }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 255, 0.1);
            position: absolute; top: 0; animation: scan 4s linear infinite; z-index: 5;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div class="ui-overlay">
    <h2 style="margin:0;">GIDEON // DEEP SCAN</h2>
    <div style="font-size: 10px; opacity: 0.6;">Sector: Cherkasy Region // 34 Communes</div>
</div>

<div class="scanline"></div>
<div id="space"></div>
<div id="chart"></div>

<div id="hud" class="hud-popup">
    <div style="float:right; cursor:pointer;" onclick="hideHUD()">[X]</div>
    <h3 id="h-title">Object</h3>
    <p id="h-desc" style="font-size: 13px; color: #8df; line-height: 1.4;"></p>
    <div class="impact" id="h-impact">Impact analysis...</div>
</div>

<script>
    const width = window.innerWidth, height = window.innerHeight;

    // Дані планет
    const planetsData = [
        { id: 1, n: "Боді-камери", color: "#ff4d4d", r: 40, ring: true, d: "Систематичне невикористання відеореєстраторів.", i: "Відсутність доказової бази, безпідставні звинувачення, нульовий контроль." },
        { id: 2, n: "Засоби захисту", color: "#ffaa00", r: 35, ring: false, d: "Брак шоломів та бронежилетів 4-го класу.", i: "Критична загроза життю ПОГ при нападі чи ППД." },
        { id: 3, n: "Транспорт", color: "#00f2ff", r: 45, ring: true, d: "Порушення транспортної дисципліни та журналів.", i: "Адмінвідповідальність, скасування дозволів на зберігання ТЗ." },
        { id: 4, n: "МТЗ Станцій", color: "#ae00ff", r: 30, ring: false, d: "Невідповідність станцій, брак сейфів та пального.", i: "Ризик крадіжки зброї, негативний імідж офіцера в ОТГ." },
        { id: 5, n: "Комунікація", color: "#00ff88", r: 38, ring: true, d: "Відсутність взаємодії ТВП з громадами.", i: "Брак фінансування на пальне та технічне забезпечення." }
    ];

    const nodes = [{ id: 0, n: "CORE", color: "#00f2ff", r: 50, type: "sun" }].concat(planetsData.map(d => ({ ...d, type: "planet" })));
    const links = planetsData.map(d => ({ source: 0, target: d.id }));

    const svg = d3.select("#chart").append("svg").attr("width", "100%").attr("height", "100%");
    const g = svg.append("g");

    // Орбіти (декоративні кола)
    g.append("g").selectAll("circle")
        .data([180, 280, 380])
        .enter().append("circle")
        .attr("class", "orbit-line")
        .attr("cx", width/2).attr("cy", height/2)
        .attr("r", d => d);

    const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(250))
        .force("charge", d3.forceManyBody().strength(-4000))
        .force("center", d3.forceCenter(width / 2, height / 2));

    // Малюємо планети
    const node = g.append("g").selectAll("g")
        .data(nodes).enter().append("g")
        .attr("class", "node")
        .on("click", (event, d) => { if(d.id !== 0) showHUD(event, d); });

    // Додаємо кільця для деяких планет
    node.filter(d => d.ring).append("ellipse")
        .attr("class", "planet-ring")
        .attr("rx", d => d.r + 20)
        .attr("ry", 10)
        .attr("stroke", d => d.color)
        .attr("transform", "rotate(-20)");

    // Тіло планети з градієнтом
    node.append("circle")
        .attr("r", d => d.r)
        .attr("fill", d => `url(#grad-${d.id})`)
        .style("--p-color", d => d.color);

    // Створюємо градієнти (світло-тінь)
    const defs = svg.append("defs");
    nodes.forEach(d => {
        const grad = defs.append("radialGradient").attr("id", `grad-${d.id}`).attr("cx", "30%").attr("cy", "30%");
        grad.append("stop").attr("offset", "0%").attr("stop-color", d.color);
        grad.append("stop").attr("offset", "100%").attr("stop-color", "#000");
    });

    node.append("text").attr("dy", d => d.r + 25).attr("text-anchor", "middle").text(d => d.n);

    sim.on("tick", () => {
        node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    function showHUD(event, d) {
        const hud = document.getElementById('hud');
        hud.style.display = 'block';
        hud.style.setProperty('--p-color', d.color);
        hud.style.left = (event.pageX + 40) + 'px';
        hud.style.top = (event.pageY - 100) + 'px';
        document.getElementById('h-title').innerText = d.n;
        document.getElementById('h-desc').innerText = d.d;
        document.getElementById('h-impact').innerText = "АНАЛІЗ НАСЛІДКІВ: " + d.i;
    }

    function hideHUD() { document.getElementById('hud').style.display = 'none'; }

    // Drag
    node.call(d3.drag()
        .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; hideHUD(); })
        .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

</script>
</body>
</html>
