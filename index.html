<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | DEEP SPACE MONITOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at center, #0b111d 0%, #000 100%); font-family: 'Segoe UI', sans-serif; }
        
        /* Космічний пил */
        #dust { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        #chart { width: 100%; height: 100%; position: absolute; z-index: 5; }

        /* Планети та анімація */
        .node circle { cursor: pointer; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .node:hover circle { transform: scale(1.2); filter: brightness(1.3) drop-shadow(0 0 30px var(--p-color)); }
        
        .node text { 
            fill: #fff; font-size: 12px; font-weight: bold; pointer-events: none; 
            text-shadow: 0 0 8px #000; text-transform: uppercase; letter-spacing: 1px;
        }

        .link { stroke: #00f2ff; stroke-opacity: 0.1; stroke-width: 1px; }

        /* Контекстне вікно біля планети */
        .planet-popup {
            position: absolute;
            background: rgba(10, 20, 30, 0.85);
            border: 1px solid var(--p-color);
            padding: 20px;
            border-radius: 4px;
            z-index: 1000;
            width: 280px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: none;
            animation: slideIn 0.4s ease-out;
            pointer-events: all;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .planet-popup h3 { margin: 0; color: var(--p-color); font-size: 16px; text-transform: uppercase; }
        .planet-popup .impact { color: #ff4d4d; font-size: 13px; margin-top: 10px; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .close-popup { float: right; cursor: pointer; font-size: 18px; color: #fff; }

        .ui-header {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            border-left: 4px solid #00f2ff; padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="ui-header">
    <h1 style="color: #00f2ff; margin:0; letter-spacing: 5px;">GIDEON MONITOR</h1>
    <p style="color: rgba(255,255,255,0.5); margin: 5px 0; font-size: 12px;">SYSTEM STATUS: ACTIVE // 34 COMMUNITIES</p>
</div>

<canvas id="dust"></canvas>
<div id="chart"></div>

<div id="info-popup" class="planet-popup">
    <span class="close-popup" onclick="hidePopup()">&times;</span>
    <h3 id="pop-title">Проблема</h3>
    <p id="pop-desc" style="font-size: 13px; color: #ccc; line-height: 1.4;"></p>
    <div class="impact" id="pop-impact">Наслідки...</div>
</div>

<script>
    const canvas = document.getElementById('dust');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initDust() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = Array.from({length: 150}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            s: Math.random() * 2, v: Math.random() * 0.2
        }));
    }

    function drawDust() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "rgba(0, 242, 255, 0.3)";
        particles.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            p.y -= p.v; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(drawDust);
    }
    initDust(); drawDust();

    const rawData = [
        { n: "Боді-камери", color: "#ff4d4d", d: "Невикористання відеореєстраторів.", i: "Відсутність доказової бази, безпідставні звинувачення офіцерів.", r: 45 },
        { n: "Засоби захисту", color: "#ffaa00", d: "Брак шоломів та бронежилетів 4-го класу.", i: "Загроза життю ПОГ при нападі чи протиправних діях.", r: 38 },
        { n: "Транспорт", color: "#00f2ff", d: "Порушення транспортної дисципліни та журналів.", i: "Скасування дозволів на зберігання ТЗ, вина керівника при ДТП.", r: 42 },
        { n: "МТЗ Станцій", color: "#ae00ff", d: "Брак пального, сейфів та обладнання станцій.", i: "Ризик крадіжки зброї, відсутність фіксації порушень ПДР.", r: 35 },
        { n: "Комунікація", color: "#00ff88", d: "Відсутність зв'язку ТВП з громадами.", i: "Брак фінансування на пальне та спецзасоби для ПОГ.", r: 40 }
    ];

    const nodes = [{ id: 0, n: "CORE", color: "#fff", r: 50, type: "center" }].concat(rawData.map((d, i) => ({ id: i+1, ...d, type: "planet" })));
    const links = rawData.map((_, i) => ({ source: 0, target: i+1 }));

    const svg = d3.select("#chart").append("svg").attr("width", "100%").attr("height", "100%");
    const g = svg.append("g");

    const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(220))
        .force("charge", d3.forceManyBody().strength(-3000))
        .force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2));

    const link = g.append("g").selectAll("line").data(links).enter().append("line").attr("class", "link");

    const node = g.append("g").selectAll("g").data(nodes).enter().append("g")
        .attr("class", "node")
        .on("click", function(event, d) {
            if(d.type === "planet") showPopup(event, d);
        });

    node.append("circle")
        .attr("r", d => d.r)
        .attr("fill", d => `url(#grad-${d.id})`)
        .style("--p-color", d => d.color);

    // Створення градієнтів для кожної планети
    const defs = svg.append("defs");
    nodes.forEach(d => {
        const grad = defs.append("radialGradient").attr("id", `grad-${d.id}`);
        grad.append("stop").attr("offset", "30%").attr("stop-color", d.color || "#00f2ff");
        grad.append("stop").attr("offset", "100%").attr("stop-color", "#000");
    });

    node.append("text").attr("dy", d => d.r + 25).attr("text-anchor", "middle").text(d => d.n);

    sim.on("tick", () => {
        link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    function showPopup(event, d) {
        const popup = document.getElementById('info-popup');
        popup.style.display = 'block';
        popup.style.setProperty('--p-color', d.color);
        popup.style.left = (event.pageX + 30) + 'px';
        popup.style.top = (event.pageY - 50) + 'px';
        document.getElementById('pop-title').innerText = d.n;
        document.getElementById('pop-desc').innerText = d.d;
        document.getElementById('pop-impact').innerText = "НАСЛІДКИ: " + d.i;
    }

    function hidePopup() { document.getElementById('info-popup').style.display = 'none'; }
    
    // Drag
    node.call(d3.drag()
        .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; hidePopup(); })
        .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

</script>
</body>
</html>
