<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GIDEON MONITOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: sans-serif; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
        
        #overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; background: rgba(0,0,0,0.5);
        }

        .btn {
            background: none; border: 2px solid #00f2ff; color: #00f2ff;
            padding: 25px 40px; font-size: 20px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px #00f2ff;
        }
        
        .btn:hover { background: #00f2ff; color: #000; }
        
        .info { margin-top: 20px; color: #fff; opacity: 0.8; font-size: 14px; text-align: center; }
        
        #chart { width: 100%; height: 100%; position: absolute; z-index: 5; visibility: hidden; }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="overlay">
    <button class="btn" onclick="start()">Перевірка поліцейських офіцерів громади</button>
    <div class="info">Відвідано 34 громади | Перевірено понад 50 ПОГ</div>
</div>

<div id="chart"></div>

<script>
    // Малюємо зірки
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const sList = Array.from({length: 200}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5}));
    
    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "white";
        sList.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
        requestAnimationFrame(draw);
    }
    draw();

    function start() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('chart').style.visibility = 'visible';
        initGraph();
    }

    function initGraph() {
        const data = [
            {n: "БОДІ-КАМЕРИ", d: "Невикористання реєстраторів"},
            {n: "ЗАХИСТ", d: "Брак бронежилетів"},
            {n: "ТРАНСПОРТ", d: "Порушення дисципліни"},
            {n: "МТЗ", d: "Стан станцій/пальне"},
            {n: "КОМУНІКАЦІЯ", d: "Зв'язок з ОТГ"}
        ];
        
        const svg = d3.select("#chart").append("svg").attr("width", "100%").attr("height", "100%");
        const g = svg.append("g").attr("transform", `translate(${window.innerWidth/2},${window.innerHeight/2})`);
        
        const nodes = [{id: 0, name: "GIDEON"}].concat(data.map((d, i) => ({id: i+1, name: d.n})));
        const links = data.map((_, i) => ({source: 0, target: i+1}));

        const sim = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(180))
            .force("charge", d3.forceManyBody().strength(-800))
            .on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });

        const link = g.append("g").selectAll("line").data(links).enter().append("line").attr("stroke", "#00f2ff").attr("opacity", 0.3);
        const node = g.append("g").selectAll("g").data(nodes).enter().append("g");
        
        node.append("circle").attr("r", d => d.id === 0 ? 30 : 10).attr("fill", "#00f2ff").style("filter", "blur(1px)");
        node.append("text").text(d => d.name).attr("dy", 30).attr("text-anchor", "middle").attr("fill", "#fff").style("font-size", "12px");
    }
</script>
</body>
</html>
