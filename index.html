<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | SPACE MONITOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Фон із зірками */
        #starfield { position: absolute; top: 0; left: 0; z-index: 0; }

        /* Контейнер для графа (спочатку прихований) */
        #chart { width: 100vw; height: 100vh; position: relative; z-index: 1; opacity: 0; transition: opacity 2s ease; pointer-events: none; }
        #chart.visible { opacity: 1; pointer-events: all; }

        /* Центральна кнопка */
        #intro-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            transition: all 1s ease;
        }

        .main-btn {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 30px 50px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.4s;
            position: relative;
        }

        .main-btn:hover {
            background: rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.5);
            transform: scale(1.05);
        }

        .stats-sub {
            display: block;
            font-size: 12px;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        /* Стилі для мапи (залишаємо з минулого разу) */
        .link { stroke: #00f2ff; stroke-opacity: 0.2; stroke-dasharray: 5,5; animation: dash 10s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -100; } }
