<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | STRATEGIC MONITOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #chart { width: 100%; height: 100%; position: absolute; z-index: 10; cursor: crosshair; }

        /* HUD - Верхні кути */
        .hud-top-left {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            color: #00f2ff; border-left: 4px solid #00f2ff; padding-left: 15px;
            pointer-events: none;
        }
        .hud-top-right {
            position: absolute; top: 30px; right: 30px; z-index: 100;
            color: #ff4d4d; text-align: right; pointer-events: none;
        }

        /* Анімація голограми */
        .node circle { cursor: pointer; transition: all 0.3s ease; }
        .holo-ring { 
            fill: none; stroke: rgba(0, 242, 255, 0.2); stroke-width: 1; 
            stroke-dasharray: 10,5; animation: rotateHolo 10s linear infinite; 
        }
        @keyframes rotateHolo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .orbit-line { fill: none; stroke: rgba(0, 242, 255, 0.05); stroke-width: 1; }

        /* Стильне вікно HUD */
        .hud-popup {
            position: absolute; background: rgba(0, 10, 20, 0.9);
            border: 1px solid var(--p-color); padding: 20px;
            z-index: 2000; width: 340px; backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,1), inset 0 0 10px var(--p-color);
            display: none; color: #fff; font-family: sans-serif;
            border-radius: 2px; animation: glitchOpen 0.2s ease;
        }

        @keyframes glitchOpen {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .hud-popup h3 { margin: 0; color: var(--p-color); text-transform: uppercase; font-size: 18px; letter-spacing: 2px; }
        .hud-popup .meta { font-size: 10px; color: #8df; margin: 5px 0; opacity: 0.7; }
        .hud-popup .impact { 
            margin-top: 15px; padding: 10px; background: rgba(255, 77, 77, 0.1); 
            border-left: 3px solid #ff4d4d; font-size: 13px; color: #ffbcbc;
        }

        .risk-value { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #ff4d4d; }
    </style>
</head>
<body>

<div class="hud-top-left">
    <h2 style="margin:0; letter-spacing: 5px;">GIDEON // CORE</h2>
    <div id="status-text" style="font-size: 12px; opacity: 0.8;">SCANNING SECTOR: CHERKASY_REG...</div>
</div>

<div class="hud-top-right">
    <div style="font-size: 10px; opacity: 0.7;">THREAT LEVEL</div>
    <div class="risk-value">CRITICAL</div>
    <div style="font-size: 10px; opacity: 0.7; margin-top:5px;">OBJECTS TRACKED: 50+</div>
</div>

<canvas id="stars-bg"></canvas>
<div id="chart"></div>

<div id="hud-window" class="hud-popup">
    <div style="float:right; cursor:pointer;" onclick="hideHUD()">[CLOSE]</div>
    <h3 id="h-title">Planetary Issue</h3>
    <span id="h-meta" class="meta">SECTOR_ANALYSIS // 2026</span>
    <p id="h-desc" style="font-size: 13px; line-height: 1.5; color: #ccc;"></p>
    <div class="impact" id="h-impact"></div>
</div>

<script>
    // --- 1. КІНЕМАТОГРАФІЧНИЙ КОСМОС ---
    const canvas = document.getElementById('stars-bg');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 250}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 1.5, s: 0.2 + Math.random() * 0.5
        }));
    }

    function drawStars() {
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            s.x -= s.s; if(s.x < 0) s.x = canvas.width;
        });
        requestAnimationFrame(drawStars);
    }
    initStars(); drawStars();

    // --- 2. ДАНІ ПЛАНЕТ ---
    const data = [
        { n: "Боді-камери", color: "#ff4d4d", d: "Невикористання портативних відеореєстраторів.", i: "Відсутність доказової бази, безпідставні звинувачення офіцерів, нульовий контроль.", r: 45 },
        { n: "Засоби захисту", color: "#ffa500", d: "Брак шоломів та бронежилетів (4 клас).", i: "Загроза життю ПОГ при нападі чи протиправних діях.", r: 35 },
        { n: "Транспорт", color: "#00f2ff", d: "Порушення транспортної дисципліни.", i: "Скасування дозволів на зберігання ТЗ, вина керівника при ДТП.", r: 40 },
        { n: "МТЗ Станцій", color: "#ae00ff", d: "Брак сейфів для зброї та пального.", i: "Ризик крадіжки зброї, негативний імідж офіцера в громаді.", r: 32 },
        { n: "Комунікація", color: "#00ff88", d: "Слабка взаємодія ТВП з ОТГ.", i: "Брак фінансування програм ПОГ (пальне, техзабезпечення).", r: 38 }
    ];

    const nodes = [{ id: 0, n: "GIDEON CORE", color: "#00f2ff", r: 55, type: "sun" }].concat(data.map((d, i) => ({ id: i+1, ...d, type: "planet" })));
    const links = data.map((_, i) => ({ source: 0, target: i+1 }));

    const svg = d3.select("#chart").append("svg").attr("width", "100%").attr("height", "100%");
    const g = svg.append("g");

    const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(280))
        .force("charge", d3.forceManyBody().strength(-4500))
        .force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2));

    // Орбіти
    g.append("g").selectAll("circle").data([200, 320, 450]).enter().append("circle").attr("class", "orbit-line")
        .attr("cx", window.innerWidth/2).attr("cy", window.innerHeight/2).attr("r", d => d);

    const node = g.append("g").selectAll("g").data(nodes).enter().append("g")
        .attr("class", "node").on("click", (e, d) => { if(d.id !== 0) showHUD(e, d); });

    // Голографічні кільця
    node.append("circle").attr("class", "holo-ring").attr("r", d => d.r + 15);

    // Градієнти планет
    const defs = svg.append("defs");
    nodes.forEach(d => {
        const grad = defs.append("radialGradient").attr("id", `grad-${d.id}`).attr("cx", "30%").attr("cy", "30%");
        grad.append("stop").attr("offset", "0%").attr("stop-color", d.color);
        grad.append("stop").attr("offset", "100%").attr("stop-color", "#000");
    });

    node.append("circle").attr("r", d => d.r).attr("fill", d => `url(#grad-${d.id})`);
    node.append("text").attr("dy", d => d.r + 35).attr("text-anchor", "middle").text(d => d.n);

    sim.on("tick", () => {
        const t = Date.now() * 0.001;
        node.attr("transform", d => `translate(${d.x},${d.y + (d.id === 0 ? 0 : Math.sin(t + d.id)*5)})`);
    });

    function showHUD(e, d) {
        const hud = document.getElementById('hud-window');
        hud.style.display = 'block';
        hud.style.setProperty('--p-color', d.color);
        hud.style.left = Math.min(e.pageX + 30, window.innerWidth - 380) + 'px';
        hud.style.top = Math.max(e.pageY - 100, 20) + 'px';
        document.getElementById('h-title').innerText = d.n;
        document.getElementById('h-desc').innerText = d.d;
        document.getElementById('h-impact').innerHTML = "<b>АНАЛІЗ НАСЛІДКІВ:</b><br>" + d.i;
    }

    function hideHUD() { document.getElementById('hud-window').style.display = 'none'; }

    // Текст статусу, що змінюється
    const statuses = ["SCANNING SECTOR: CHERKASY...", "ANALYZING LOGS...", "CHECKING GPS_DATA...", "UPDATING THREAT_MAP..."];
    let sIdx = 0;
    setInterval(() => {
        document.getElementById('status-text').innerText = statuses[sIdx];
        sIdx = (sIdx + 1) % statuses.length;
    }, 3000);

    node.call(d3.drag()
        .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; hideHUD(); })
        .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

</script>
</body>
</html>
