<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GIDEON | ANALYTIC INTERFACE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        :root {
            --accent: #00f2ff;
            --critical: #ff3030;
            --bg: #05070a;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: #fff; 
        }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #chart { width: 100%; height: 100%; position: absolute; z-index: 10; }

        /* HUD - Панель управління */
        .hud-header {
            position: absolute; top: 40px; left: 40px; z-index: 100;
            border-left: 4px solid var(--accent); padding-left: 20px;
            pointer-events: none;
        }
        .hud-header h1 { margin: 0; font-size: 26px; letter-spacing: 1px; text-transform: uppercase; }
        .hud-header p { margin: 5px 0; font-size: 13px; color: var(--accent); opacity: 0.8; }

        /* Стиль Вузлів (Кристали) */
        .node { cursor: pointer; }
        .crystal-shape { 
            fill: #1a2635; stroke: var(--accent); stroke-width: 2px;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        }
        .node-core .crystal-shape { fill: var(--accent); stroke: #fff; }

        /* Зв'язки-лазери */
        .laser-line { 
            stroke: var(--accent); stroke-opacity: 0.4; stroke-width: 2px;
            stroke-dasharray: 8; animation: pulse-dash 2s linear infinite;
        }
        @keyframes pulse-dash { to { stroke-dashoffset: -16; } }

        /* Текстові підписи */
        .node text { 
            fill: #fff; font-size: 13px; font-weight: 600; text-anchor: middle;
            text-transform: uppercase; pointer-events: none;
        }

        /* HUD Popup - Вікно інформації */
        .hud-popup {
            position: absolute; background: #0c121d;
            border: 2px solid var(--accent); border-radius: 8px;
            padding: 0; z-index: 2000; width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: none; overflow: hidden; animation: popIn 0.2s ease-out;
        }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } }

        .popup-header { background: var(--accent); color: #000; padding: 15px; font-weight: bold; font-size: 16px; }
        .popup-body { padding: 20px; }
        .popup-unit { color: var(--accent); font-size: 12px; font-weight: bold; margin-bottom: 10px; display: block; }
        
        /* Червоний блок Наслідків */
        .impact-alert { 
            background: var(--critical); color: #fff; 
            padding: 15px; margin-top: 15px; border-radius: 4px;
            font-size: 13px; line-height: 1.4;
        }
        .impact-alert b { display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .close-btn { float: right; cursor: pointer; font-size: 20px; line-height: 1; }
    </style>
</head>
<body>

<div class="hud-header">
    <h1>GIDEON ANALYTICS</h1>
    <p>OBJECT STATUS: 5 CRITICAL VULNERABILITIES DETECTED</p>
</div>

<canvas id="stars-bg"></canvas>
<div id="chart"></div>

<div id="hud-window" class="hud-popup">
    <div class="popup-header">
        <span class="close-btn" onclick="hideHUD()">&times;</span>
        <span id="h-title">Назва проблеми</span>
    </div>
    <div class="popup-body">
        <span id="h-unit" class="popup-unit">ПІДРОЗДІЛ</span>
        <p id="h-desc" style="margin: 0; font-size: 14px; color: #ccc;"></p>
        <div class="impact-alert">
            <b>Наслідки:</b>
            <div id="h-impact"></div>
        </div>
    </div>
</div>

<script>
    // --- ЗОРЯНЕ НЕБО (БІЛЬШ ПОВІЛЬНЕ) ---
    const canvas = document.getElementById('stars-bg');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 200}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 1.2, s: 0.1 + Math.random() * 0.2
        }));
    }

    function drawStars() {
        ctx.fillStyle = "#05070a"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            s.x -= s.s; if(s.x < 0) s.x = canvas.width;
        });
        requestAnimationFrame(drawStars);
    }
    initStars(); drawStars();

    // --- ДАНІ ---
    const data = [
        { n: "Боді-камери", u: "Всі підрозділи", d: "Невикористання поліцейськими портативних відеореєстраторів.", i: "Відсутність доказової бази, безпідставні звинувачення офіцерів, нульовий контроль.", r: 42 },
        { n: "Засоби захисту", u: "Черкаське РУП", d: "Брак шоломів та бронежилетів не нижче 4-го класу захисту.", i: "Критична загроза життю ПОГ у разі нападу чи протиправних дій.", r: 38 },
        { n: "Транспорт", u: "Всі підрозділи", d: "Порушення вимог транспортної дисципліни та журналів.", i: "Скасування дозволів, адмінвідповідальність, вина керівника при ДТП.", r: 40 },
        { n: "МТЗ Станцій", u: "Всі підрозділи", d: "Невідповідність станцій нормам, брак сейфів та пального.", i: "Ризик крадіжки зброї, негативний імідж офіцера в громаді.", r: 35 },
        { n: "Комунікація", u: "Всі підрозділи", d: "Слабка взаємодія ТВП з органами місцевого самоврядування.", i: "Брак фінансування програм ПОГ (пальне, техзабезпечення).", r: 38 }
    ];

    const nodes = [{ id: 0, n: "GIDEON CORE", type: "core", r: 55 }].concat(data.map((d, i) => ({ id: i+1, ...d, type: "issue" })));
    const links = data.map((_, i) => ({ source: 0, target: i+1 }));

    const svg = d3.select("#chart").append("svg").attr("width", "100%").attr("height", "100%");
    const g = svg.append("g");

    const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(260))
        .force("charge", d3.forceManyBody().strength(-3500))
        .force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2));

    const link = g.append("g").selectAll("line").data(links).enter().append("line").attr("class", "laser-line");

    const node = g.append("g").selectAll("g").data(nodes).enter().append("g")
        .attr("class", d => `node ${d.type === 'core' ? 'node-core' : ''}`)
        .on("click", (e, d) => { if(d.id !== 0) showHUD(e, d); });

    // Малюємо непрозорі Кристали (Гексагони)
    node.append("path")
        .attr("class", "crystal-shape")
        .attr("d", d => {
            const r = d.r;
            return `M 0 -${r} L ${r*0.86} -${r/2} L ${r*0.86} ${r/2} L 0 ${r} L -${r*0.86} ${r/2} L -${r*0.86} -${r/2} Z`;
        });

    node.append("text").attr("dy", d => d.r + 30).text(d => d.n);

    sim.on("tick", () => {
        const t = Date.now() * 0.002;
        node.attr("transform", d => `translate(${d.x},${d.y + (d.id === 0 ? 0 : Math.sin(t + d.id)*6)})`);
        link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    });

    function showHUD(e, d) {
        const hud = document.getElementById('hud-window');
        hud.style.display = 'block';
        hud.style.left = Math.min(e.pageX + 30, window.innerWidth - 380) + 'px';
        hud.style.top = Math.max(e.pageY - 100, 20) + 'px';
        document.getElementById('h-title').innerText = d.n;
        document.getElementById('h-unit').innerText = "ОБ'ЄКТ: " + d.u;
        document.getElementById('h-desc').innerText = d.d;
        document.getElementById('h-impact').innerText = d.i;
    }

    function hideHUD() { document.getElementById('hud-window').style.display = 'none'; }

    node.call(d3.drag()
        .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; hideHUD(); })
        .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));
</script>
</body>
</html>
